site_name: LionAGI
site_description: Governed multi-agent orchestration for Python, the command line, and durable operations
site_url: https://ohdearquant.github.io/lionagi/
repo_url: https://github.com/ohdearquant/lionagi
repo_name: ohdearquant/lionagi
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 Ocean Li and LionAGI Contributors

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
  font: false
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Historical v0 design material remains in the repository for archaeology, but
# it is intentionally absent from the public site and search index.
exclude_docs: |
  _archive/
  cookbook/reliable-artifact-production.md
  cookbook/reliable-multi-leg-runs.md
  cookbook/reliable-recurring-runs.md
  cookbook/reliable-review-runs.md
  overrides/
  reference/migrate-logs.md
  reference/outcomes-work.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      pygments_lang_class: true
      use_pygments: true
      auto_title: false
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: ohdearquant
      repo: lionagi
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: 
        - docs
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang:
        - en
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - git-committers:
      repository: ohdearquant/lionagi
      branch: main
      enabled: false
  - autorefs
  - mkdocstrings:
      enable_inventory: true
      default_handler: python
      handlers:
        python:
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://docs.pydantic.dev/latest/objects.inv
          options:
            show_root_heading: true
            show_root_toc_entry: true
            show_root_full_path: false
            show_root_members_full_path: false
            show_source: true
            show_signature: true
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_category_heading: true
            show_bases: true
            show_if_no_docstring: false
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: table
            members_order: source
            separate_signature: true
            filters: ["!^_"]
            annotations_path: brief
            line_length: 80
  - tags
  # - social:
  #     cards_layout_options:
  #       background_color: "#1e1e1e"
  #       color: "#ffffff"
  #       font_family: Inter

