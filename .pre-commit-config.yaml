repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: debug-statements
      - id: check-added-large-files
      - id: check-ast
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        exclude: '\.ipynb$'
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: '\.ipynb$'

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.json"]
        files: ^(docs/|README\.md|AGENT\.md|CLAUDE\.md|CONTRIBUTING\.md|CHANGELOG\.md)

  # Studio frontend: ESLint (Next.js + TS) + Prettier on staged files.
  # Skipped if node_modules/ is absent (e.g. fresh checkout); enable with:
  #   pnpm install --prefix apps/studio/frontend
  - repo: local
    hooks:
      - id: studio-frontend-eslint
        name: studio-frontend-eslint
        language: system
        entry: apps/studio/frontend/scripts/precommit-eslint.sh
        files: ^apps/studio/frontend/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        exclude: ^apps/studio/frontend/(node_modules|\.next|out|dist)/
        pass_filenames: true
      - id: studio-frontend-prettier
        name: studio-frontend-prettier
        language: system
        entry: apps/studio/frontend/scripts/precommit-prettier.sh
        files: ^apps/studio/frontend/.*\.(ts|tsx|js|jsx|mjs|cjs|json|css|md)$
        exclude: ^apps/studio/frontend/(node_modules|\.next|out|dist)/
        pass_filenames: true
      - id: marketplace-lint
        name: marketplace-lint
        language: system
        entry: scripts/ci.sh lint-marketplace
        files: ^(marketplace/|\.claude-plugin/)
        pass_filenames: false
