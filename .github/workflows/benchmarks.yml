name: Benchmarks

# Same-machine A/B: every suite runs twice on this runner, once against a
# baseline lionagi install (older commit) and once against the current
# checkout, using the exact same benchmark harness both times. Only the
# library implementation differs between the two runs, so the comparison
# isolates the code change instead of cross-runner hardware/load variance.
#
# Both runs execute from a neutral working directory (a copy of benchmarks/
# with no sibling lionagi/ source tree) rather than the checkout root.
# `python -m benchmarks.X` prepends cwd to sys.path; running from the
# checkout root would let a stray `lionagi/` directory there shadow
# whichever venv's install the interpreter should actually be using,
# silently making both runs measure identical code. See
# benchmarks/_compat.py:lionagi_provenance and
# benchmarks/ci_check_provenance.py, which asserts the two runs disagree
# on which lionagi install they imported.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history is required to compute a true merge-base for the
          # baseline ref below (a shallow clone has no common ancestor).
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --all-extras

      - name: Determine baseline ref
        id: baseline
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.event.pull_request.base.ref }}"
            base_sha=$(git merge-base HEAD "$base_ref")
          else
            # push event: the webhook's own record of the branch tip right
            # before this push (github.event.before) is the correct
            # baseline -- HEAD^ is only the previous commit in the pushed
            # range, so a push of several commits at once would leave an
            # earlier commit's regression already inside the "baseline"
            # and ungated. Two edge cases fall back to HEAD^ instead:
            #   - a brand new branch, where before is the all-zero SHA;
            #   - a force push whose old tip is no longer reachable from
            #     any ref and can't be fetched (rare, but possible if the
            #     job runs long enough after the push for it to be gone).
            before_sha="${{ github.event.before }}"
            if [ -z "$before_sha" ] || [ "$before_sha" = "$zero_sha" ]; then
              echo "push 'before' is the zero SHA (new branch); falling back to HEAD^."
              before_sha=""
            elif ! git rev-parse --verify --quiet "${before_sha}^{commit}" > /dev/null 2>&1; then
              echo "push 'before' ($before_sha) not present locally (forced=${{ github.event.forced }}); attempting to fetch it directly."
              git fetch --no-tags --depth=1 origin "$before_sha" > /dev/null 2>&1 || true
              if ! git rev-parse --verify --quiet "${before_sha}^{commit}" > /dev/null 2>&1; then
                echo "push 'before' ($before_sha) is not fetchable -- likely discarded by a force-push; falling back to HEAD^."
                before_sha=""
              fi
            fi

            if [ -n "$before_sha" ]; then
              base_sha="$before_sha"
            elif git rev-parse --verify --quiet HEAD^ > /dev/null 2>&1; then
              base_sha=$(git rev-parse HEAD^)
            else
              echo "No parent commit found (root commit); using HEAD as its own baseline."
              base_sha=$(git rev-parse HEAD)
            fi
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Baseline ref resolved to: $base_sha"
          git log -1 --format='  %h %s (%ci)' "$base_sha"

      - name: Build baseline venv (same runner, older lionagi)
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: |
          set -euo pipefail
          git worktree add --detach "$RUNNER_TEMP/lionagi-baseline" "$BASELINE_SHA"
          uv venv "$RUNNER_TEMP/.venv-baseline" --python ${{ matrix.python-version }}
          # Same-machine A/B applies to the dependency axis too, not just
          # the interpreter and the OS: only the lionagi implementation
          # should differ between arms. Export every package version
          # uv.lock actually resolved for the current venv and pass it as
          # a constraints file to the baseline install, so anyio, orjson,
          # and every other shared dependency land on identical versions
          # in both venvs -- otherwise a compare delta could be dependency
          # drift (a transitive package released a new version between
          # the baseline commit and today) rather than a lionagi change.
          # Drop the `-e file://...` line: that is this checkout's own
          # editable lionagi entry, and constraining the *baseline*
          # install to point back at the *current* checkout's source
          # would defeat the whole point of building a separate baseline.
          # If the baseline commit's own pyproject.toml requirements are
          # incompatible with a constraint from today's lock (e.g. a
          # dependency floor or cap that has since changed), `uv pip
          # install` fails this step outright with an unresolvable-
          # constraints error rather than silently falling back to an
          # unconstrained resolution -- treated as a hard CI failure here,
          # consistent with this workflow's fail-loud posture elsewhere.
          uv pip freeze --python .venv/bin/python | grep -v '^-e ' > "$RUNNER_TEMP/current-deps.constraints.txt"
          # trio is a dev-only extra, not a runtime dependency of the
          # lionagi package itself, so it must be requested explicitly (a
          # constraints file only pins versions of packages something else
          # already pulls in -- it can't cause trio to be installed on its
          # own). Its version still comes from the constraints file above.
          uv pip install --python "$RUNNER_TEMP/.venv-baseline/bin/python" \
            --constraints "$RUNNER_TEMP/current-deps.constraints.txt" \
            "$RUNNER_TEMP/lionagi-baseline" trio

      - name: Build neutral bench harness (no sibling lionagi/ source dir)
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-harness"
          cp -R "$GITHUB_WORKSPACE/benchmarks" "$RUNNER_TEMP/bench-harness/benchmarks"
          # Sanity: this dir must contain benchmarks/ but NOT a lionagi/
          # source tree, otherwise `-m benchmarks.X` would shadow both
          # venvs' installs the same way the checkout root does.
          if [ -e "$RUNNER_TEMP/bench-harness/lionagi" ]; then
            echo "::error::neutral bench harness unexpectedly contains a lionagi/ dir"
            exit 1
          fi

      # Every suite below runs once under the baseline venv and once under
      # the current venv, both times as `-m benchmarks.X` from the neutral
      # harness directory built above (identical benchmark scripts, only
      # the invoking interpreter's own site-packages install differs).
      # --repeat counts are lower than a single-run-per-suite design would
      # use: paired same-machine comparison removes cross-runner variance,
      # the dominant noise source that produced false regressions under the
      # old frozen-baseline design, so fewer repeats still give a reliable
      # signal, and it keeps the doubled suite count close to the job's
      # previous wall-clock time.

      - name: Run concurrency benchmarks - baseline (asyncio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$RUNNER_TEMP/.venv-baseline/bin/python" -m benchmarks.concurrency_bench --repeat 50 --backend asyncio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/baseline/concurrency-asyncio.json"

      - name: Run concurrency benchmarks - current (asyncio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$GITHUB_WORKSPACE/.venv/bin/python" -m benchmarks.concurrency_bench --repeat 50 --backend asyncio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/current/concurrency-asyncio.json"

      - name: Run concurrency benchmarks - baseline (trio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$RUNNER_TEMP/.venv-baseline/bin/python" -m benchmarks.concurrency_bench --repeat 50 --backend trio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/baseline/concurrency-trio.json"

      - name: Run concurrency benchmarks - current (trio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$GITHUB_WORKSPACE/.venv/bin/python" -m benchmarks.concurrency_bench --repeat 50 --backend trio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/current/concurrency-trio.json"

      - name: Run ln benchmarks - baseline (asyncio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$RUNNER_TEMP/.venv-baseline/bin/python" -m benchmarks.ln_bench --repeat 10 --backend asyncio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/baseline/ln-asyncio.json"

      - name: Run ln benchmarks - current (asyncio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$GITHUB_WORKSPACE/.venv/bin/python" -m benchmarks.ln_bench --repeat 10 --backend asyncio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/current/ln-asyncio.json"

      - name: Run ln benchmarks - baseline (trio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$RUNNER_TEMP/.venv-baseline/bin/python" -m benchmarks.ln_bench --repeat 10 --backend trio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/baseline/ln-trio.json"

      - name: Run ln benchmarks - current (trio)
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$GITHUB_WORKSPACE/.venv/bin/python" -m benchmarks.ln_bench --repeat 10 --backend trio --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/current/ln-trio.json"

      - name: Run fuzzy benchmarks - baseline
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$RUNNER_TEMP/.venv-baseline/bin/python" -m benchmarks.fuzzy_bench --repeat 10 --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/baseline/fuzzy.json"

      - name: Run fuzzy benchmarks - current
        run: |
          cd "$RUNNER_TEMP/bench-harness"
          "$GITHUB_WORKSPACE/.venv/bin/python" -m benchmarks.fuzzy_bench --repeat 10 --output "$GITHUB_WORKSPACE/benchmarks/_ci_out/current/fuzzy.json"

      - name: Verify lionagi provenance and scenario coverage (baseline vs current)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_check_provenance.py --baseline-dir benchmarks/_ci_out/baseline --current-dir benchmarks/_ci_out/current

      - name: Compare concurrency asyncio (baseline vs current, same machine)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_compare.py --baseline benchmarks/_ci_out/baseline/concurrency-asyncio.json --current benchmarks/_ci_out/current/concurrency-asyncio.json --threshold 0.2

      - name: Compare concurrency trio (baseline vs current, same machine)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_compare.py --baseline benchmarks/_ci_out/baseline/concurrency-trio.json --current benchmarks/_ci_out/current/concurrency-trio.json --threshold 0.2

      - name: Compare ln asyncio (baseline vs current, same machine)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_compare.py --baseline benchmarks/_ci_out/baseline/ln-asyncio.json --current benchmarks/_ci_out/current/ln-asyncio.json --threshold 0.2

      - name: Compare ln trio (baseline vs current, same machine)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_compare.py --baseline benchmarks/_ci_out/baseline/ln-trio.json --current benchmarks/_ci_out/current/ln-trio.json --threshold 0.2

      - name: Compare fuzzy (baseline vs current, same machine)
        run: |
          source .venv/bin/activate
          python benchmarks/ci_compare.py --baseline benchmarks/_ci_out/baseline/fuzzy.json --current benchmarks/_ci_out/current/fuzzy.json --threshold 0.2

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results-py${{ matrix.python-version }}
          path: benchmarks/_ci_out/**/*.json
