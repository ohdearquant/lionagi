name: marketplace-lint

on:
  pull_request:
    paths:
      - 'marketplace/**'
      - '.claude-plugin/**'
      - 'skills/**'
      - 'README.md'
      - 'scripts/ci.sh'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Lint marketplace content + manifests
        run: scripts/ci.sh lint-marketplace
