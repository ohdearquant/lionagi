name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        uv venv
        uv sync --all-extras
    - name: Lint Python
      run: scripts/ci.sh lint-python

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Lint markdown (formatting)
      uses: DavidAnson/markdownlint-cli2-action@v23
      with:
        globs: "docs/**/*.md,README.md,AGENT.md,CLAUDE.md,CONTRIBUTING.md,CHANGELOG.md"
        config: ".markdownlint.json"

    - name: Check internal links
      uses: lycheeverse/lychee-action@v2
      with:
        args: "--no-progress --offline docs/ README.md AGENT.md CLAUDE.md CONTRIBUTING.md"
        fail: true

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: oldest + newest only (60% faster). Full matrix on main/develop pushes.
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && '["3.10","3.14"]' || '["3.10","3.11","3.12","3.13","3.14"]') }}
    # Force every `uv` call (venv, sync, run) onto the matrix interpreter; the
    # repo's .python-version (3.10) otherwise pins all legs to 3.10.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Cache uv downloads
      uses: actions/cache@v6
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-py${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        uv venv
        uv sync --all-extras

    # Coverage runs on 3.10 only (present in both the PR and the full matrix);
    # other versions run without coverage instrumentation — 5-10x faster.
    # Codecov is uploaded only from the coverage run.
    - name: Run tests with coverage
      if: matrix.python-version == '3.10'
      run: scripts/ci.sh test-python-cov

    - name: Run tests
      if: matrix.python-version != '3.10'
      run: scripts/ci.sh test-python

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: ohdearquant/lionagi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio/frontend
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/studio/frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint + typecheck
      run: |
        npm run lint
        npm run typecheck
    - name: Build
      run: npm run build

  vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vscode
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/vscode/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Typecheck
      run: npm run typecheck
    - name: Build
      run: npm run compile
    - name: Test
      run: npm run test

  marketplace:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install ripgrep
      run: sudo apt-get install -y ripgrep
    - name: Lint marketplace
      run: scripts/ci.sh lint-marketplace

  publish:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Build package
      run: uv build
