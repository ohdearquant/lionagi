name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        uv venv
        uv sync --all-extras
    - name: Lint Python
      run: scripts/ci.sh lint-python

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Lint markdown (formatting)
      uses: DavidAnson/markdownlint-cli2-action@v23
      with:
        globs: "docs/**/*.md,README.md,AGENT.md,CLAUDE.md,CHANGELOG.md"
        config: ".markdownlint.json"

    - name: Check internal links
      uses: lycheeverse/lychee-action@v2
      with:
        args: "--no-progress --offline docs/ README.md AGENT.md CLAUDE.md"
        fail: true

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: oldest + newest only (60% faster). Full matrix on push to main.
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && '["3.10","3.14"]' || '["3.10","3.11","3.12","3.13","3.14"]') }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv venv
        uv sync --all-extras

    - name: Run tests with coverage
      run: scripts/ci.sh test-python-cov

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: ohdearquant/lionagi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio/frontend
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/studio/frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint + typecheck
      run: |
        npm run lint
        npm run typecheck
    - name: Build
      run: npm run build

  marketplace:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install ripgrep
      run: sudo apt-get install -y ripgrep
    - name: Lint marketplace
      run: scripts/ci.sh lint-marketplace

  publish:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Build package
      run: uv build
