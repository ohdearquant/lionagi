name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.ipynb'

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Lint markdown (formatting)
      uses: DavidAnson/markdownlint-cli2-action@v23
      with:
        globs: "docs/**/*.md,README.md,AGENT.md,CLAUDE.md,CHANGELOG.md"
        config: ".markdownlint.json"

    - name: Check internal links
      uses: lycheeverse/lychee-action@v2
      with:
        args: "--no-progress --offline docs/ README.md AGENT.md CLAUDE.md"
        fail: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv venv
        uv sync --all-extras

    - name: Run tests with coverage
      run: |
        source .venv/bin/activate
        uv run pytest --asyncio-mode=auto --maxfail=1 --disable-warnings --cov=lionagi --cov-report=xml --cov-report=term tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: khive-ai/lionagi

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Build package
      run: uv build
